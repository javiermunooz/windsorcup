<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windsor Cup — Key Setup</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; background: #0a0e1a; color: #f1f5f9; }
    h1 { margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-top: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
    input { display: block; width: 100%; padding: 0.5rem; margin-top: 0.25rem; background: #131a2e; border: 1px solid #1e293b; border-radius: 6px; color: #f1f5f9; font-size: 0.9rem; }
    button { margin-top: 1.5rem; padding: 0.5rem 1.5rem; background: #c8f526; color: #0a0e1a; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    .output { margin-top: 1.5rem; }
    .output h2 { font-size: 1rem; margin-bottom: 0.5rem; }
    textarea { width: 100%; height: 80px; background: #131a2e; border: 1px solid #1e293b; border-radius: 6px; color: #c8f526; font-family: monospace; font-size: 0.8rem; padding: 0.5rem; }
    p { font-size: 0.85rem; color: #94a3b8; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>Windsor Cup — Key Setup</h1>
  <p>This tool encrypts your GitHub Personal Access Token with two passphrases. Run it once, then paste the output into <code>js/config.js</code>.</p>

  <label for="api-key">GitHub Personal Access Token</label>
  <input type="text" id="api-key" placeholder="github_pat_...">

  <label for="gist-id">Gist ID</label>
  <input type="text" id="gist-id" placeholder="abc123def456...">

  <label for="match-pass">Match Passphrase (shared with all players)</label>
  <input type="password" id="match-pass" placeholder="Passphrase for match submissions">

  <label for="admin-pass">Admin Passphrase (only you)</label>
  <input type="password" id="admin-pass" placeholder="Passphrase for admin access">

  <button id="generate">Generate Encrypted Blobs</button>

  <div class="output" id="output" style="display:none">
    <h2>config.js</h2>
    <p>Paste this into <code>js/config.js</code>:</p>
    <textarea id="setup-script" readonly style="height:160px"></textarea>
  </div>

  <script type="module">
    async function deriveKey(passphrase, salt) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
      );
    }

    async function encrypt(plaintext, passphrase) {
      const enc = new TextEncoder();
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(passphrase, salt);
      const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(plaintext));
      const result = new Uint8Array(salt.length + iv.length + ciphertext.byteLength);
      result.set(salt, 0);
      result.set(iv, salt.length);
      result.set(new Uint8Array(ciphertext), salt.length + iv.length);
      return btoa(String.fromCharCode(...result));
    }

    document.getElementById("generate").addEventListener("click", async () => {
      const token = document.getElementById("api-key").value.trim();
      const gistId = document.getElementById("gist-id").value.trim();
      const matchPass = document.getElementById("match-pass").value;
      const adminPass = document.getElementById("admin-pass").value;

      if (!token || !matchPass || !adminPass || !gistId) {
        alert("All fields are required.");
        return;
      }

      const matchBlob = await encrypt(token, matchPass);
      const adminBlob = await encrypt(token, adminPass);

      document.getElementById("setup-script").value =
        `"use strict";\n\n` +
        `const GIST_ID = "${gistId}";\n` +
        `const MATCH_ENCRYPTED_BLOB = "${matchBlob}";\n` +
        `const ADMIN_ENCRYPTED_BLOB = "${adminBlob}";\n\n` +
        `export { GIST_ID, MATCH_ENCRYPTED_BLOB, ADMIN_ENCRYPTED_BLOB };\n`;
      document.getElementById("output").style.display = "block";
    });
  </script>
</body>
</html>
